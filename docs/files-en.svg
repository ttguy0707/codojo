<svg width="1200" height="430" viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Codojo file protocol">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#991b1b" flood-opacity=".10"/>
    </filter>
    <style>
      .bg{fill:#fffdfd;stroke:#fee2e2;stroke-width:1.5}
      .title{font:700 30px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#111827}
      .subtitle{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#6b7280}
      .box{fill:#fff;stroke:#fecaca;stroke-width:1.6;filter:url(#shadow)}
      .side{fill:#fff7f7;stroke:#fecaca;stroke-width:1.5}
      .label{font:700 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#111827}
      .desc{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#4b5563}
      .line{stroke:#dc2626;stroke-width:2.4;marker-end:url(#arrow)}
      .dash{stroke:#9ca3af;stroke-width:2.2;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" x="18" y="18" width="1164" height="394" rx="28"/>
  <text class="title" x="600" y="62" text-anchor="middle">.codojo File Protocol</text>
  <text class="subtitle" x="600" y="90" text-anchor="middle">Learning state is persisted as files, so the agent can resume across sessions.</text>

  <g transform="translate(70 140)">
    <rect class="box" x="0" y="0" width="190" height="92" rx="16"/>
    <text class="label" x="95" y="38" text-anchor="middle">open-questions.md</text>
    <text class="desc" x="95" y="64" text-anchor="middle">assessment</text>
    <line class="line" x1="202" y1="46" x2="248" y2="46"/>

    <rect class="box" x="260" y="0" width="160" height="92" rx="16"/>
    <text class="label" x="340" y="38" text-anchor="middle">task.md</text>
    <text class="desc" x="340" y="64" text-anchor="middle">learning plan</text>
    <line class="line" x1="432" y1="46" x2="478" y2="46"/>

    <rect class="box" x="490" y="0" width="180" height="92" rx="16"/>
    <text class="label" x="580" y="38" text-anchor="middle">schedule.md</text>
    <text class="desc" x="580" y="64" text-anchor="middle">progress</text>

    <line class="line" x1="682" y1="34" x2="748" y2="-2"/>
    <line class="line" x1="682" y1="62" x2="748" y2="136"/>

    <rect class="box" x="760" y="-40" width="180" height="92" rx="16"/>
    <text class="label" x="850" y="-2" text-anchor="middle">notebook.md</text>
    <text class="desc" x="850" y="24" text-anchor="middle">notes</text>

    <rect class="box" x="760" y="128" width="180" height="92" rx="16"/>
    <text class="label" x="850" y="166" text-anchor="middle">plan.md</text>
    <text class="desc" x="850" y="192" text-anchor="middle">modification plan</text>

    <rect class="side" x="260" y="168" width="230" height="92" rx="16"/>
    <text class="label" x="375" y="206" text-anchor="middle">manifest.json</text>
    <text class="desc" x="375" y="232" text-anchor="middle">install metadata · CLI</text>
    <line class="dash" x1="430" y1="168" x2="535" y2="92"/>
  </g>
</svg>
