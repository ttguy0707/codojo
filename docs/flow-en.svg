<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Codojo learning flow">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#991b1b" flood-opacity=".10"/>
    </filter>
    <style>
      .bg{fill:#fffdfd;stroke:#fee2e2;stroke-width:1.5}
      .title{font:700 30px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#111827}
      .subtitle{font:15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#6b7280}
      .card{fill:#fff;stroke:#fecaca;stroke-width:1.6;filter:url(#shadow)}
      .stage{font:800 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#dc2626;letter-spacing:.5px}
      .label{font:700 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#111827}
      .desc{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#4b5563}
      .line{stroke:#dc2626;stroke-width:2.4;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" x="18" y="18" width="1164" height="324" rx="28"/>
  <text class="title" x="600" y="62" text-anchor="middle">Codojo Learning Flow</text>
  <text class="subtitle" x="600" y="90" text-anchor="middle">Understand the project, build a plan, learn through practice, then modify it.</text>

  <g transform="translate(60 132)">
    <rect class="card" x="0" y="0" width="170" height="150" rx="18"/>
    <text class="stage" x="85" y="34" text-anchor="middle">S0</text>
    <text class="label" x="85" y="68" text-anchor="middle">Project Scan</text>
    <text class="desc" x="85" y="99" text-anchor="middle">Load methodology</text>
    <text class="desc" x="85" y="122" text-anchor="middle">Detect stack</text>
    <line class="line" x1="184" y1="75" x2="211" y2="75"/>

    <rect class="card" x="225" y="0" width="170" height="150" rx="18"/>
    <text class="stage" x="310" y="34" text-anchor="middle">S1</text>
    <text class="label" x="310" y="68" text-anchor="middle">Assessment</text>
    <text class="desc" x="310" y="99" text-anchor="middle">Generate questions</text>
    <text class="desc" x="310" y="122" text-anchor="middle">Record goals</text>
    <line class="line" x1="409" y1="75" x2="436" y2="75"/>

    <rect class="card" x="450" y="0" width="170" height="150" rx="18"/>
    <text class="stage" x="535" y="34" text-anchor="middle">S2</text>
    <text class="label" x="535" y="68" text-anchor="middle">Plan</text>
    <text class="desc" x="535" y="99" text-anchor="middle">Customize topics</text>
    <text class="desc" x="535" y="122" text-anchor="middle">Assign practice</text>
    <line class="line" x1="634" y1="75" x2="661" y2="75"/>

    <rect class="card" x="675" y="0" width="170" height="150" rx="18"/>
    <text class="stage" x="760" y="34" text-anchor="middle">S3</text>
    <text class="label" x="760" y="68" text-anchor="middle">Teaching</text>
    <text class="desc" x="760" y="99" text-anchor="middle">Explain theory</text>
    <text class="desc" x="760" y="122" text-anchor="middle">Edit real code</text>
    <line class="line" x1="859" y1="75" x2="886" y2="75"/>

    <rect class="card" x="900" y="0" width="170" height="150" rx="18"/>
    <text class="stage" x="985" y="34" text-anchor="middle">S4</text>
    <text class="label" x="985" y="68" text-anchor="middle">Modify</text>
    <text class="desc" x="985" y="99" text-anchor="middle">Propose changes</text>
    <text class="desc" x="985" y="122" text-anchor="middle">Implement</text>
  </g>
</svg>
